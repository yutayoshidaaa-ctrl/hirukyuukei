<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>爆走！お昼休憩あみだ</title>

<style>
body {
    color: #fff;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    margin: 0;
    overflow-x: hidden;
    text-align: center;
    background: radial-gradient(circle at center, #fff7b8 0%, #f6c400 30%, #9b6700 70%, #2b1600 100%);
}

.rotating-light {
    position: fixed;
    inset: -50%;
    z-index: -5;
    background: repeating-conic-gradient(
        from 0deg,
        rgba(255,255,255,0.75) 0deg,
        rgba(255,230,80,0.45) 2deg,
        transparent 5deg,
        transparent 9deg
    );
    animation: rotateLight 25s linear infinite;
    opacity: 0.65;
}

@keyframes rotateLight {
    0% { transform: rotate(0deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1.2); }
}

.bg-bubbles,
.bg-sparkles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
}

.bg-bubbles { z-index: -4; }
.bg-sparkles { z-index: -3; }

.bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.45);
    box-shadow: 0 0 35px rgba(255,255,255,0.9), 0 0 60px rgba(255,215,0,0.8);
    animation: floatBubble linear infinite;
}

@keyframes floatBubble {
    0% {
        transform: translateY(110vh) translateX(0) scale(0.7);
        opacity: 0;
    }
    20% { opacity: 0.9; }
    100% {
        transform: translateY(-20vh) translateX(100px) scale(1.4);
        opacity: 0;
    }
}

.mouse-glow {
    position: fixed;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,230,80,0.45), transparent 70%);
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: screen;
    transform: translate(-50%, -50%);
    transition: 0.08s ease-out;
}

.sparkle {
    position: absolute;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 0 8px #fff, 0 0 18px #ffe680;
    animation: sparkleMove linear infinite;
}

@keyframes sparkleMove {
    0% {
        transform: translateY(105vh) rotate(0deg) scale(0.5);
        opacity: 0;
    }
    15% { opacity: 1; }
    50% {
        transform: translateY(50vh) rotate(180deg) scale(1.3);
        opacity: 0.95;
    }
    100% {
        transform: translateY(-10vh) rotate(360deg) scale(0.5);
        opacity: 0;
    }
}

.flash {
    position: fixed;
    inset: 0;
    background: white;
    z-index: 5000;
    opacity: 0;
    pointer-events: none;
}

.flash.active {
    animation: flashEffect 0.8s ease-out;
}

@keyframes flashEffect {
    0% { opacity: 0; }
    15% { opacity: 1; }
    100% { opacity: 0; }
}

/* 結果発表前ブラックアウト */
.blackout {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 6000;
    opacity: 0;
    pointer-events: none;
}

.blackout.active {
    animation: blackoutEffect 1.6s ease-in-out forwards;
}

@keyframes blackoutEffect {
    0% { opacity: 0; }
    25% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}

/* バーン文字 */
.baan-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.2);
    z-index: 7000;
    font-size: 5rem;
    font-weight: bold;
    color: #fff;
    text-shadow:
        0 0 10px #fff,
        0 0 25px #ffd700,
        0 0 45px #ff0077;
    opacity: 0;
    pointer-events: none;
}

.baan-text.active {
    animation: baanEffect 0.8s ease-out forwards;
}

@keyframes baanEffect {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2) rotate(-10deg);
    }
    30% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.4) rotate(4deg);
    }
    60% {
        transform: translate(-50%, -50%) scale(0.95) rotate(-2deg);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.8) rotate(0deg);
    }
}

#header {
    padding: 20px;
    background: rgba(0,0,0,0.55);
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid #ff0077;
    backdrop-filter: blur(8px);
}

h1 {
    text-shadow: 0 0 10px #ff0077, 0 0 25px #ffd700;
}

#start-btn {
    padding: 15px 45px;
    font-size: 1.2rem;
    cursor: pointer;
    background: linear-gradient(90deg, #ff0077, #ffcc00, #ff0077);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 0 20px rgba(255,0,119,0.8), 0 0 35px rgba(255,215,0,0.8);
    margin-top: 15px;
}

#start-btn:disabled {
    background: #555;
    cursor: not-allowed;
    box-shadow: none;
}

.member-selector {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    max-width: 900px;
    margin: 10px auto 0;
    padding: 10px;
    background: rgba(0,0,0,0.45);
    border-radius: 12px;
    border: 1px solid #ffd700;
    box-shadow: 0 0 18px rgba(255,215,0,0.5);
}

.member-checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    padding: 6px 12px;
    background-color: rgba(0,0,0,0.75);
    border-radius: 20px;
    border: 1px solid #ffd700;
    background-image: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
    background-size: 400%;
    animation: rainbowMove 4s linear infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.member-checkbox-label input {
    width: 18px;
    height: 18px;
    accent-color: #ff0077;
}

@keyframes rainbowMove {
    0% { background-position: 0%; }
    100% { background-position: 400%; }
}

.amida-wrapper {
    position: relative;
    margin: 50px auto;
    display: inline-block;
    padding-bottom: 100px;
    z-index: 5;
}

.column {
    position: relative;
    width: 140px;
    float: left;
}

.vertical-line {
    width: 5px;
    background: #1b1b1b;
    height: 1500px;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 0 10px #fff, 0 0 20px #ffd700;
}

.horizontal-line {
    position: absolute;
    height: 5px;
    background: #1b1b1b;
    width: 140px;
    left: 50%;
    z-index: 1;
    box-shadow: 0 0 10px #fff, 0 0 20px #ffd700;
}

.name-label {
    height: 60px;
    font-weight: bold;
    font-size: 1.1rem;
    color: #fff;
    text-shadow: 0 0 5px #000, 0 0 10px #00ffcc, 0 0 20px #fff;
}

.goal-label {
    height: 80px;
    margin-top: 20px;
    font-size: 1.5rem;
    font-weight: bold;
    color: #ffea00;
    border-top: 2px dashed #fff;
    padding-top: 10px;
    text-shadow: 0 0 10px #000, 0 0 20px #ffd700;
}

.runner {
    position: absolute;
    width: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(90deg, #ff0077, #ffcc00);
    color: white;
    padding: 5px;
    border-radius: 5px;
    font-weight: bold;
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 0 15px #ff0077, 0 0 25px #ffd700;
}

.result-screen {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.3);
    background: rgba(0,0,0,0.88);
    padding: 40px;
    border: 4px solid #ffd700;
    z-index: 2000;
    border-radius: 22px;
    min-width: 380px;
    box-shadow: 0 0 35px rgba(255,215,0,0.95), 0 0 70px rgba(255,255,255,0.8);
}

.result-screen.show-baan {
    animation: resultBaan 0.65s cubic-bezier(.17,.67,.16,1.45) forwards;
}

@keyframes resultBaan {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2) rotate(-8deg);
    }
    60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15) rotate(3deg);
    }
    100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
    }
}

#result-screen h2,
.result-item {
    background-image: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
    background-size: 400%;
    animation: rainbowMove 4s linear infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: bold;
}

.result-item {
    font-size: 1.5rem;
    margin: 15px 0;
    border-bottom: 1px solid #555;
    padding-bottom: 5px;
}

.result-item.first-place {
    font-size: 2rem;
    animation: rainbowMove 2s linear infinite, firstPlacePulse 0.8s ease-in-out infinite alternate;
}

@keyframes firstPlacePulse {
    0% { transform: scale(1); filter: drop-shadow(0 0 8px gold); }
    100% { transform: scale(1.15); filter: drop-shadow(0 0 25px gold); }
}

.gold-particle {
    position: fixed;
    font-size: 28px;
    color: gold;
    text-shadow: 0 0 10px #fff, 0 0 25px gold;
    pointer-events: none;
    z-index: 4000;
    animation: goldExplosion 1.5s ease-out forwards;
}

@keyframes goldExplosion {
    0% {
        transform: translate(0,0) scale(0.4) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translate(var(--x), var(--y)) scale(1.6) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="rotating-light"></div>
<div class="bg-bubbles" id="bg-bubbles"></div>
<div class="bg-sparkles" id="bg-sparkles"></div>
<div class="mouse-glow" id="mouse-glow"></div>
<div class="flash" id="flash"></div>
<div class="blackout" id="blackout"></div>
<div class="baan-text" id="baan-text">バーーーン!!!</div>

<div id="header">
    <h1>🍱 お昼休憩サバイバルあみだ</h1>
    <div class="member-selector" id="checkbox-area"></div>
    <button id="start-btn" onclick="runAmida()">運命のスタート！</button>
</div>

<div class="amida-wrapper" id="amida-area"></div>

<div id="result-screen" class="result-screen">
    <h2>✨ 本日の出撃順 ✨</h2>
    <div id="result-list"></div>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px;">もう一度</button>
</div>

<script>
const masterNames = ["岩本 佳奈映", "古賀 瑞稀", "古江 彩", "森田初音", "中村 駿也", "上村鞠奈", "森川愛実"];

let names = [];
let lineCount = 0;
const amidaHeight = 1500;
const hLineData = [];
const finalResultsArray = [];

function createBackgroundEffects() {
    const bubbleArea = document.getElementById('bg-bubbles');
    const sparkleArea = document.getElementById('bg-sparkles');

    for (let i = 0; i < 55; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        const size = Math.random() * 100 + 25;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = Math.random() * 100 + 'vw';
        bubble.style.animationDuration = (Math.random() * 13 + 9) + 's';
        bubble.style.animationDelay = (Math.random() * -20) + 's';
        bubble.style.opacity = Math.random() * 0.55 + 0.25;

        bubbleArea.appendChild(bubble);
    }

    for (let i = 0; i < 85; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.textContent = Math.random() > 0.5 ? '✦' : '✧';

        sparkle.style.left = Math.random() * 100 + 'vw';
        sparkle.style.fontSize = (Math.random() * 24 + 12) + 'px';
        sparkle.style.animationDuration = (Math.random() * 8 + 5) + 's';
        sparkle.style.animationDelay = (Math.random() * -12) + 's';

        sparkleArea.appendChild(sparkle);
    }
}

function setupMouseGlow() {
    const glow = document.getElementById('mouse-glow');

    document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });
}

function flashStart() {
    const flash = document.getElementById('flash');
    flash.classList.remove('active');
    void flash.offsetWidth;
    flash.classList.add('active');
}

function playBlackoutBaan() {
    return new Promise(resolve => {
        const blackout = document.getElementById('blackout');
        const baanText = document.getElementById('baan-text');

        blackout.classList.remove('active');
        baanText.classList.remove('active');

        void blackout.offsetWidth;

        blackout.classList.add('active');

        setTimeout(() => {
            baanText.classList.add('active');
        }, 900);

        setTimeout(() => {
            resolve();
        }, 1450);
    });
}

function goldExplosion() {
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    for (let i = 0; i < 90; i++) {
        const p = document.createElement('div');
        p.className = 'gold-particle';
        p.textContent = Math.random() > 0.5 ? '✨' : '💥';

        p.style.left = centerX + 'px';
        p.style.top = centerY + 'px';

        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 380 + 80;

        p.style.setProperty('--x', Math.cos(angle) * distance + 'px');
        p.style.setProperty('--y', Math.sin(angle) * distance + 'px');

        document.body.appendChild(p);

        setTimeout(() => p.remove(), 1600);
    }
}

function initSelector() {
    const checkboxArea = document.getElementById('checkbox-area');
    checkboxArea.innerHTML = masterNames.map(name => `
        <label class="member-checkbox-label">
            <input type="checkbox" value="${name}" checked onchange="buildAmida()">
            ${name}
        </label>
    `).join('');
    buildAmida();
}

function buildAmida() {
    const checkboxes = document.querySelectorAll('#checkbox-area input[type="checkbox"]');
    names = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
    lineCount = names.length;

    const area = document.getElementById('amida-area');
    const startBtn = document.getElementById('start-btn');

    if (lineCount < 2) {
        area.innerHTML = `<p style="color:#ff0077; font-size:1.2rem; margin-top:50px;">出勤者を2人以上選択してください！</p>`;
        startBtn.disabled = true;
        return;
    }

    startBtn.disabled = false;

    let html = "";
    for (let i = 0; i < lineCount; i++) {
        html += `
            <div class="column" id="col-${i}">
                <div class="name-label" id="label-${i}">${names[i]}</div>
                <div class="vertical-line"></div>
                <div class="goal-label" id="goal-${i}">?</div>
            </div>`;
    }

    area.innerHTML = html;
    hLineData.length = 0;

    const totalHLines = lineCount * 8;

    for (let i = 0; i < totalHLines; i++) {
        const col = Math.floor(Math.random() * (lineCount - 1));
        const top = Math.floor(Math.random() * (amidaHeight - 200)) + 100;

        if (hLineData.some(h => h.col === col && Math.abs(h.top - top) < 25)) continue;

        hLineData.push({ col, top });

        const hl = document.createElement('div');
        hl.className = 'horizontal-line';
        hl.style.top = top + 'px';
        document.getElementById(`col-${col}`).appendChild(hl);
    }
}

async function runAmida() {
    flashStart();

    document.getElementById('start-btn').disabled = true;
    document.querySelectorAll('#checkbox-area input').forEach(cb => cb.disabled = true);

    const results = Array.from({length: lineCount}, (_, i) => i + 1).sort(() => Math.random() - 0.5);

    for (let i = 0; i < lineCount; i++) {
        document.getElementById(`goal-${i}`).innerText = results[i] + "番";
    }

    finalResultsArray.length = 0;

    const promises = names.map((name, i) => startRunner(name, i, results));
    await Promise.all(promises);

    await playBlackoutBaan();

    setTimeout(() => {
        finalResultsArray.sort((a, b) => a.rank - b.rank);

        const list = document.getElementById('result-list');
        list.innerHTML = finalResultsArray.map(r => `
            <div class="result-item ${r.rank === 1 ? 'first-place' : ''}">
                <b>${r.rank}番：</b>${r.name}
            </div>
        `).join('');

        const resultScreen = document.getElementById('result-screen');
        resultScreen.style.display = 'block';
        resultScreen.classList.remove('show-baan');
        void resultScreen.offsetWidth;
        resultScreen.classList.add('show-baan');

        window.scrollTo(0,0);

        goldExplosion();
    }, 80);
}

async function startRunner(name, startIdx, results) {
    const runner = document.createElement('div');
    runner.className = 'runner';
    runner.innerText = name;

    document.getElementById(`col-${startIdx}`).querySelector('.vertical-line').appendChild(runner);
    document.getElementById(`label-${startIdx}`).style.visibility = 'hidden';

    let currentCol = startIdx;
    let currentY = 0;

    const myPath = () => hLineData
        .filter(h => h.col === currentCol || h.col === currentCol - 1)
        .sort((a,b) => a.top - b.top);

    while (true) {
        const lines = myPath().filter(h => h.top > currentY);
        if (lines.length === 0) break;

        const nextLine = lines[0];

        await animate(runner, { top: nextLine.top + 'px' }, (nextLine.top - currentY) * 2);
        currentY = nextLine.top;

        const isRight = nextLine.col === currentCol;
        const targetCol = isRight ? currentCol + 1 : currentCol - 1;
        const moveX = isRight ? '140px' : '-140px';

        await animate(runner, { left: `calc(50% + ${moveX})` }, 200);

        currentCol = targetCol;

        document.getElementById(`col-${currentCol}`).querySelector('.vertical-line').appendChild(runner);
        runner.style.left = '50%';

        if (startIdx === 0) window.scrollTo(0, currentY - 200);
    }

    await animate(runner, { top: amidaHeight + 'px' }, (amidaHeight - currentY) * 2);

    finalResultsArray.push({
        name: name,
        rank: results[currentCol]
    });
}

function animate(el, props, dur) {
    return new Promise(res => {
        const anim = el.animate([props], {
            duration: dur,
            fill: 'forwards'
        });
        anim.onfinish = res;
    });
}

createBackgroundEffects();
setupMouseGlow();
initSelector();
</script>

</body>
</html>
